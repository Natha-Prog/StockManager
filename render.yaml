services:
  - type: web
    name: stockmanager-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stockmanager-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGIN
        value: https://stockmanager-frontend.onrender.com
      - key: ADMIN_EMAIL
        value: admin@stock.local
      - key: ADMIN_PASSWORD
        generateValue: true

  - type: web
    name: stockmanager-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://stockmanager-backend.onrender.com/api

databases:
  - name: stockmanager-db
    databaseName: stockmanager
    user: stockmanager_user
    plan: free
