services:
  - type: web
    name: stockmanager
    env: docker
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stockmanager-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGIN
        value: https://stockmanager.onrender.com
      - key: ADMIN_EMAIL
        value: admin@stock.local
      - key: ADMIN_PASSWORD
        generateValue: true

databases:
  - name: stockmanager-db
    databaseName: stockmanager
    user: stockmanager_user
    plan: free
